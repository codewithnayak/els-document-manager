# Manual trigger allowed
trigger: none

# Run when Dockerfile changes
# pr: none
# trigger:
#   branches:
#     include:
#       - main
#   paths:
#     include:
#       - Dockerfile
#       - docker/**
#       - src/**/Dockerfile

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: "Release"
  imageName: "iels/iels-doc-manager"
  acrName: "ielsacr.azurecr.io"

steps:
  # -------------------------------------------------------
  # 1. Build + Test again (same as Pipeline A)
  # -------------------------------------------------------
  - task: UseDotNet@2
    inputs:
      packageType: "sdk"
      version: "9.x"

  - script: dotnet restore
    workingDirectory: $(Build.SourcesDirectory)
    displayName: Restore

  - script: dotnet build --configuration $(buildConfiguration) --no-restore
    workingDirectory: $(Build.SourcesDirectory)
    displayName: Build

  - script: |
      dotnet test \
        --configuration $(buildConfiguration) \
        --no-build \
        --collect:"XPlat Code Coverage" \
        --logger trx
    workingDirectory: $(Build.SourcesDirectory)
    displayName: Test + Coverage

  # -------------------------------------------------------
  # 2. Build & Push Docker Image
  # -------------------------------------------------------
  - task: DockerInstaller@0
    displayName: Install Docker

  - task: AzureCLI@2
    displayName: ACR Login
    inputs:
      azureSubscription: "acr-connection"
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        az acr login --name $(acrName)

  - script: |
      docker build -t $(acrName)/$(imageName):$(Build.BuildId) .
      docker push $(acrName)/$(imageName):$(Build.BuildId)
    displayName: Build & Push Docker Image
